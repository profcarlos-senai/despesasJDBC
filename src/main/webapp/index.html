<!DOCTYPE html>
<html lang="pt-br">
<head>
	<link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Despesas</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="mb-3">Lista de Despesas</h1>

    <button id="btnCarregar" class="btn btn-primary mb-3">
        Carregar despesas
    </button>

    <table class="table table-striped" id="tabela">
        <thead>
            <tr>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Data</th>
				<th>Categoria</th>				                
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

</div>


<!-- javascript do Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.js"></script>
<!-- Código do app -->
<script src="js/listadesp.js"></script>



<!-- Modal -->
<div class="modal fade" id="modalDespesa" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Detalhes da Despesa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body p-0">
        <iframe id="iframeDespesa" 
                style="width:100%; height:400px; border:none;">
        </iframe>
      </div>

    </div>
  </div>
</div>

</body>
</html>
