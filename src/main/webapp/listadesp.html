<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Despesas</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Bootstrap JS & Popper JS -->
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</head>
<body>

<div class="container mt-4">

    <h1 class="mb-3">Lista de Despesas</h1>

    <button id="btnCarregar" class="btn btn-primary mb-3">
        Carregar despesas
    </button>

    <table class="table table-striped" id="tabela">
        <thead>
            <tr>
                <th>ID</th>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Data</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    document.getElementById("btnCarregar").addEventListener("click", function () {

        fetch("despesas/")
            .then(res => res.json())
            .then(dados => {

				// joga o corpo da tabela numa var
                const tbody = document.querySelector("#tabela tbody");
				
				// zera o html do corpo da tabela
                tbody.innerHTML = "";

                dados.forEach(d => { // vasculha o array de despesas

					// cria uma linha
                    const linha = document.createElement("tr");

					// escreve a linha
                    linha.innerHTML = `
                        <td>${d.id}</td>
                        <td>${d.descricao}</td>
                        <td>${d.valor}</td>
                        <td>${d.data}</td>
                    `;

					// adiciona essa linha na tabela
                    tbody.appendChild(linha);
                });

            })
            .catch(err => console.error(err));

    });

});
</script>

</body>
</html>
