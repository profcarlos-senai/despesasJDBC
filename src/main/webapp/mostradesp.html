<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mostrar Despesa</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>

</head>
<body>

<div class="container mt-4">

<h1>Despesa</h1>

<table class="table">
<tr>
<th>ID</th>
<td id="id"></td>
</tr>

<tr>
<th>Descrição</th>
<td id="descricao"></td>
</tr>

<tr>
<th>Valor</th>
<td id="valor"></td>
</tr>

<tr>
<th>Data</th>
<td id="data"></td>
</tr>
</table>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    fetch("api/despesas/" + id)
        .then(res => res.json())
        .then(d => {

            document.getElementById("id").textContent = d.id;
            document.getElementById("descricao").textContent = d.descricao;
            document.getElementById("valor").textContent = d.valor;
            document.getElementById("data").textContent = d.data;

        });

});

</script>

</body>
</html>
